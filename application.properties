# ======================== EUREKA ==============================
eureka.client.service-url.defaultZone=http://${EUREKA_HOST:localhost}:8761/eureka
eureka.instance.prefer-ip-address=true

# ======================== DATABASE ============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:skillsync_default}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# ======================== JPA / HIBERNATE =====================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ======================== CONFIG RETRY ========================
spring.cloud.config.fail-fast=false
spring.cloud.config.retry.max-attempts=6
spring.cloud.config.retry.initial-interval=2000

# ======================== JWT =================================
jwt.secret=${JWT_SECRET}
jwt.access-expiration=900000
jwt.refresh-expiration=604800000

# ======================== ACTUATOR ============================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.enabled=true

# ======================== LOGGING =============================
logging.level.com.skillsync=INFO
logging.level.org.springframework.cloud.gateway=DEBUG
management.metrics.tags.application=${spring.application.name}
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans

# ============================================================
# CORS (Gateway will pick this up automatically)
# ============================================================
app.cors.allowed-origins=${ALLOWED_ORIGINS:https://skillsync.mraks.dev,https://skill-sync-sage.vercel.app}

# ============================================================
# API GATEWAY ROUTING LOGIC (Safely ignored by other services)
# ============================================================
spring.cloud.gateway.routes[0].id=block-internal-routes
spring.cloud.gateway.routes[0].uri=no://op
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/internal/**
spring.cloud.gateway.routes[0].filters[0]=SetStatus=403
spring.cloud.gateway.routes[0].order=-1

spring.cloud.gateway.routes[1].id=auth-service-api
spring.cloud.gateway.routes[1].uri=lb://auth-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[2].id=auth-actuator-alias
spring.cloud.gateway.routes[2].uri=lb://auth-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/auth/actuator/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/auth/(?<segment>.*),/${segment}

spring.cloud.gateway.routes[3].id=auth-alias
spring.cloud.gateway.routes[3].uri=lb://auth-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/auth/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/auth/(?<segment>.*),/api/auth/${segment}

spring.cloud.gateway.routes[4].id=oauth2-alias
spring.cloud.gateway.routes[4].uri=lb://auth-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/oauth2/**

spring.cloud.gateway.routes[5].id=login-alias
